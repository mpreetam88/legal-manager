<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - N.K Mishra & Associates</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-panel">
      <div class="login-brand">
        <div class="firm">N.K Mishra & Associates</div>
        <div class="small-muted">Legal Case Management System</div>
      </div>

      <h2>Welcome Back</h2>
      <p>Please sign in to continue.</p>

      <div>
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter username" />
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" />
      </div>

      <div class="button-row">
        <button class="btn" style="width:100%;" onclick="login()">Login</button>
      </div>

      <div class="footer-note" style="margin-top:16px;">
        Default login: admin / admin123
      </div>
    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        alert('Please enter username and password');
        return;
      }

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          window.location.href = '/dashboard.html';
        } else {
          alert(data.message || 'Invalid credentials');
        }
      } catch (error) {
        alert('Error connecting to server');
        console.error(error);
      }
    }
  </script>
</body>
</html>
